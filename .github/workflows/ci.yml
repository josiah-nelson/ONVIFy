name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ──────────────────────────────────────────────
  # Build + Lint + Unit Tests (GitHub-hosted)
  # Runs for all events including fork PRs — safe,
  # no secrets or self-hosted runners exposed.
  # ──────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy .

      - name: Unit tests
        run: pytest -m "not integration" --tb=short -q

  # ──────────────────────────────────────────────
  # Windows E2E (self-hosted)
  # Only runs for pushes, manual dispatch, or PRs
  # from this repo (never fork PRs).
  # ──────────────────────────────────────────────
  e2e-windows:
    name: Windows E2E (Self-Hosted)
    needs: build
    runs-on: [self-hosted, Windows, X64]
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    concurrency:
      group: e2e-windows
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Locate Python
        id: python
        shell: pwsh
        run: |
          $py = (Get-Command python -ErrorAction SilentlyContinue).Source
          if (-not $py) { $py = (Get-Command py -ErrorAction SilentlyContinue).Source }
          if (-not $py) { throw "Python not found on this runner. Install Python 3.13+." }
          $v = & $py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          $full = & $py --version
          $major = [int]$v.Split('.')[0]; $minor = [int]$v.Split('.')[1]
          if ($major -lt 3 -or ($major -eq 3 -and $minor -lt 13)) {
            throw "Python >= 3.13 required, found $full"
          }
          Write-Host "Using $full at $py"

      - name: Install dependencies
        run: pip install -e ".[dev,inference]"

      - name: Run integration tests
        run: pytest -m integration --tb=short

      - name: Build MSI installer
        shell: pwsh
        run: |
          # TODO: WiX build placeholder
          Write-Host "MSI build not yet configured"

  # ──────────────────────────────────────────────
  # macOS E2E (self-hosted, Apple Silicon)
  # ──────────────────────────────────────────────
  e2e-macos:
    name: macOS E2E (Self-Hosted)
    needs: build
    runs-on: [self-hosted, macOS, ARM64]
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    concurrency:
      group: e2e-macos
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Locate Python
        run: |
          command -v python3 || { echo "Python 3 not found. Install via: brew install python@3.13"; exit 1; }
          version=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          major=${version%%.*}; minor=${version##*.}
          if [ "$major" -lt 3 ] || { [ "$major" -eq 3 ] && [ "$minor" -lt 13 ]; }; then
            echo "Python >= 3.13 required, found $(python3 --version)"; exit 1
          fi
          echo "Using $(python3 --version) at $(command -v python3)"

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev,inference,coreml]"

      - name: Run integration tests (CoreML)
        run: |
          source .venv/bin/activate
          pytest -m integration --tb=short

  # ──────────────────────────────────────────────
  # Release + Azure Code Signing (tag-triggered)
  # Runs on self-hosted Windows runner with access
  # to Azure OIDC. Protected by `environment: release`
  # which scopes secrets to tag refs only.
  # ──────────────────────────────────────────────
  release:
    name: Release & Sign
    needs: [build, e2e-windows, e2e-macos]
    runs-on: [self-hosted, Windows, X64]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Locate Python
        shell: pwsh
        run: |
          $py = (Get-Command python -ErrorAction SilentlyContinue).Source
          if (-not $py) { $py = (Get-Command py -ErrorAction SilentlyContinue).Source }
          if (-not $py) { throw "Python not found on this runner. Install Python 3.13+." }
          $v = & $py -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
          $full = & $py --version
          $major = [int]$v.Split('.')[0]; $minor = [int]$v.Split('.')[1]
          if ($major -lt 3 -or ($major -eq 3 -and $minor -lt 13)) {
            throw "Python >= 3.13 required, found $full"
          }
          Write-Host "Using $full at $py"

      - name: Determine version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pip install -e ".[dev,inference]"

      - name: Build MSI installer
        shell: pwsh
        run: |
          # PyInstaller bundle + WiX build
          Write-Host "Building ONVIFy v${{ steps.version.outputs.version }}"
          # TODO: pyinstaller + wix build steps

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign release artifacts
        uses: azure/artifact-signing-action@v1.2.0
        with:
          azure-endpoint: https://eus.codesigning.azure.net/
          azure-code-signing-account-name: ${{ secrets.SIGNING_ACCOUNT }}
          azure-certificate-profile-name: ${{ secrets.SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ONVIFy ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
