name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ──────────────────────────────────────────────
  # Build + Lint + Unit Tests (GitHub-hosted)
  # ──────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy .

      - name: Unit tests
        run: pytest -m "not integration" --tb=short -q

  # ──────────────────────────────────────────────
  # Windows E2E (self-hosted)
  # ──────────────────────────────────────────────
  e2e-windows:
    name: Windows E2E (Self-Hosted)
    needs: build
    runs-on: [self-hosted, Windows, X64]
    if: false  # Enable when self-hosted runner is configured

    concurrency:
      group: e2e-windows
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,inference]"

      - name: Run integration tests
        run: pytest -m integration --tb=short

      - name: Build MSI installer
        shell: pwsh
        run: |
          # WiX build placeholder
          Write-Host "MSI build not yet configured"

  # ──────────────────────────────────────────────
  # Linux E2E (self-hosted)
  # ──────────────────────────────────────────────
  e2e-linux:
    name: Linux E2E (Self-Hosted)
    needs: build
    runs-on: [self-hosted, Linux, X64]
    if: false  # Enable when self-hosted runner is configured

    concurrency:
      group: e2e-linux
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev,inference]"

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest -m integration --tb=short

  # ──────────────────────────────────────────────
  # macOS E2E (self-hosted, Apple Silicon)
  # ──────────────────────────────────────────────
  e2e-macos:
    name: macOS E2E (Self-Hosted)
    needs: build
    runs-on: [self-hosted, macOS, ARM64]
    if: false  # Enable when self-hosted runner is configured

    concurrency:
      group: e2e-macos
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev,inference,coreml]"

      - name: Run integration tests (CoreML)
        run: |
          source .venv/bin/activate
          pytest -m integration --tb=short

  # ──────────────────────────────────────────────
  # Release (tag or manual trigger)
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
